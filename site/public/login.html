<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 中通冷链文档</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #09090b;
            color: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Ambient background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(0, 125, 138, 0.10) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
            animation: ambientShift 20s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes ambientShift {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(2%, -2%) scale(1.02); }
            66% { transform: translate(-1%, 1%) scale(0.98); }
            100% { transform: translate(1%, -1%) scale(1.01); }
        }

        /* Grid pattern overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 56px 48px;
            width: 420px;
            text-align: center;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(0, 125, 138, 0.06);
            animation: cardAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(12px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 28px;
            background: linear-gradient(135deg, #007d8a 0%, #4dd6dc 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0, 125, 138, 0.30);
            animation: logoFloat 6s ease-in-out infinite;
        }

        .logo svg {
            width: 32px;
            height: 32px;
            color: #fff;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .login-card h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #fafafa 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: all 0.3s;
        }

        .login-card .subtitle {
            font-size: 14px;
            color: #71717a;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        }

        .divider span {
            font-size: 12px;
            color: #52525b;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .login-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: linear-gradient(135deg, #1677ff 0%, #0958d9 100%);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 32px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: inherit;
            letter-spacing: 0.2px;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow:
                0 8px 24px rgba(22, 119, 255, 0.35),
                0 0 0 1px rgba(22, 119, 255, 0.2);
        }

        .login-btn:hover::before {
            opacity: 1;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .login-btn svg {
            width: 22px;
            height: 22px;
            position: relative;
            z-index: 1;
        }

        .login-btn .btn-text {
            position: relative;
            z-index: 1;
        }

        .status {
            margin-top: 20px;
            font-size: 13px;
            color: #71717a;
            min-height: 20px;
            transition: all 0.2s;
        }

        .status.error {
            color: #ef4444;
        }

        .status.success {
            color: #22c55e;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .footer {
            margin-top: 36px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .footer p {
            font-size: 12px;
            color: #52525b;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                width: calc(100vw - 32px);
                padding: 40px 24px;
                border-radius: 20px;
            }

            .logo {
                width: 48px;
                height: 48px;
                border-radius: 14px;
            }

            .logo svg {
                width: 24px;
                height: 24px;
            }

            .login-card h1 {
                font-size: 20px;
            }
        }

        /* DingTalk environment badge */
        .env-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 20px;
            font-size: 12px;
            color: #10b981;
            margin-bottom: 20px;
        }

        .env-badge .dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* DingTalk icon (official style) */
        .dingtalk-svg {
            display: inline-flex;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <path d="M9 12l2 2 4-4"/>
            </svg>
        </div>
        <h1>中通冷链文档</h1>
        <p class="subtitle">操作手册 · 请使用钉钉登录</p>

        <div id="env-indicator"></div>

        <div class="divider">
            <span>身份验证</span>
        </div>

        <button class="login-btn" id="login-btn" onclick="doLogin()">
            <svg class="dingtalk-svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.69-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.42-.88.03-.24.37-.49 1.02-.75 3.99-1.74 6.65-2.89 7.99-3.44 3.8-1.58 4.59-1.86 5.1-1.87.11 0 .37.03.54.17.14.12.18.28.2.45-.01.06.01.24 0 .38z"/>
            </svg>
            <span class="btn-text">使用钉钉登录</span>
        </button>

        <div class="status" id="status"></div>

        <div class="footer">
            <p>中通冷链 · 安全加密传输</p>
        </div>
    </div>

    <script>
        const BASE = '';
        const params = new URLSearchParams(location.search);
        const redirect = params.get('redirect') || '/';

        let corpId = '';

        async function loadConfig() {
            try {
                const r = await fetch(`${BASE}/api/auth/config/public`);
                const data = await r.json();
                corpId = data.corpId || '';
            } catch { corpId = ''; }
        }

        loadConfig();

        // 钉钉环境内自动登录
        const isInDingTalk = navigator.userAgent.toLowerCase().includes('dingtalk');
        if (isInDingTalk) {
            const indicator = document.getElementById('env-indicator');
            indicator.innerHTML = '<div class="env-badge"><span class="dot"></span> 钉钉环境 · 自动登录</div>';
            autoLogin();
        }

        async function doLogin() {
            const btn = document.getElementById('login-btn');
            const status = document.getElementById('status');
            btn.disabled = true;
            status.innerHTML = '<span class="spinner"></span> 正在获取登录地址...';
            status.className = 'status';
            try {
                const r = await fetch(`${BASE}/api/auth/dingtalk/url?redirect=${encodeURIComponent(redirect)}`);
                const data = await r.json();
                if (data.url) {
                    status.innerHTML = '<span class="spinner"></span> 跳转钉钉登录...';
                    window.location.href = data.url;
                } else {
                    throw new Error(data.error || '获取登录地址失败');
                }
            } catch (err) {
                status.textContent = err.message;
                status.className = 'status error';
                btn.disabled = false;
            }
        }

        async function autoLogin() {
            const status = document.getElementById('status');
            const btn = document.getElementById('login-btn');
            status.innerHTML = '<span class="spinner"></span> 正在连接钉钉...';
            btn.disabled = true;

            const script = document.createElement('script');
            script.src = 'https://g.alicdn.com/dingding/dingtalk-jsapi/3.0.25/dingtalk.open.js';
            script.onload = async () => {
                try {
                    dd.ready(() => {
                        dd.runtime.permission.requestAuthCode({
                            corpId: corpId || 'dingj7jagakjrccgceq3',
                            onSuccess: async (result) => {
                                status.innerHTML = '<span class="spinner"></span> 正在登录...';
                                try {
                                    const r = await fetch(`${BASE}/api/auth/dingtalk/auto`, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ authCode: result.code }),
                                    });
                                    const data = await r.json();
                                    if (data.success) {
                                        status.textContent = '登录成功，正在跳转...';
                                        status.className = 'status success';
                                        setTimeout(() => { window.location.href = redirect; }, 500);
                                    } else {
                                        throw new Error(data.error || '自动登录失败');
                                    }
                                } catch (err) {
                                    status.textContent = err.message;
                                    status.className = 'status error';
                                    btn.disabled = false;
                                }
                            },
                            onFail: () => {
                                status.textContent = '自动登录失败，请手动扫码';
                                status.className = 'status error';
                                btn.disabled = false;
                            },
                        });
                    });
                } catch {
                    status.textContent = '钉钉 SDK 加载失败';
                    status.className = 'status error';
                    btn.disabled = false;
                }
            };
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
