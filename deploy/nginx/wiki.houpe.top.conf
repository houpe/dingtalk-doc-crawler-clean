# Keep the ACME HTTP challenge reachable and send normal traffic to HTTPS.
server {
    listen 80;
    server_name wiki.houpe.top;

    root /zto;

    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name wiki.houpe.top;

    ssl_certificate /www/zhengshu/wildcard.houpe.top.pem;
    ssl_certificate_key /www/zhengshu/wildcard.houpe.top.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    root /zto;
    index index.html;

    location / {
        # VitePress clean URLs are emitted as both directories and .html files.
        try_files $uri $uri.html $uri/ $uri/index.html /404.html;
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
