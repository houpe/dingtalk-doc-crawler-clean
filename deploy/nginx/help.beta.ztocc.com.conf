# help.beta.ztocc.com —— 中通冷链文档站（Node 钉钉鉴权 + VitePress 静态产物）
# 部署位置：宝塔面板 /www/server/panel/vhost/nginx/help.beta.ztocc.com.conf
# 反代到本地 Node 服务 docs-auth（pm2，监听 127.0.0.1:4000）
server {
    listen 80;
    listen 443 ssl;
    http2 on;

    server_name help.beta.ztocc.com;

    ssl_certificate    /www/server/panel/vhost/letsencrypt/help.beta.ztocc.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/letsencrypt/help.beta.ztocc.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    error_page 497 https://$host$request_uri;

    client_max_body_size 50m;

    # 路径穿越拦截（鉴权绕过纵深防御，配合应用层 rejectPathTraversal）。
    # 注意：merge_slashes 默认 on，nginx 在 location 匹配前会把 $uri 归一化，
    # 所以用正则 location 匹配 $uri 拦不住 ".."。必须检测 $request_uri（原始请求行路径，
    # 不被归一化）。同时覆盖 %2e/%2E 编码变体。
    if ($request_uri ~* "(?:\.\.|%2e%2e|%2E%2E|%2e%2E|%2E%2e)") {
        return 400;
    }

    # 全部转给 Node 服务（处理钉钉鉴权 + 通过后服务静态 dist）
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ~* /(?:\.git|\.svn|\.bzr|\.vscode|\.idea|node_modules|runtime)/ {
        return 404;
    }

    location ~* (?:\.user\.ini|\.htaccess|\.htpasswd|\.env.*|\.project|\.DS_Store|\.gitignore|\.gitattributes|README\.md|package(?:-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|docker-compose\.yml|Dockerfile)$ {
        return 404;
    }

    access_log /www/wwwlogs/help.beta.ztocc.com.log;
    error_log /www/wwwlogs/help.beta.ztocc.com.error.log;
}
